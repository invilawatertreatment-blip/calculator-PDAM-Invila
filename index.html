<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .responsive-text-saving { font-size: clamp(1.5rem, 5vw, 3.5rem); }
    </style>
</head>
<body class="bg-transparent p-4">

    <div class="max-w-3xl mx-auto bg-white rounded-[2.5rem] shadow-2xl p-6 md:p-10 border border-slate-100">
        <h2 class="text-2xl md:text-3xl font-extrabold mb-10 text-center italic tracking-tight text-slate-800">
            Hitung Potensi Saving Anda
        </h2>

        <div class="grid md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest italic">
                    Volume Air Existing (m³/hari)
                </label>
                <input type="number" id="vol_total" value="2000" 
                    class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-bold text-lg outline-none focus:border-emerald-500 transition shadow-inner italic">
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest italic">
                    Harga Jasa Invila™ (Rp/m³)
                </label>
                <input type="number" id="invila_price" value="6900" 
                    class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-bold text-lg outline-none focus:border-emerald-500 transition text-emerald-700 italic">
            </div>
        </div>

        <div class="mb-10">
            <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest italic">
                Harga PDAM (Rp/m³)
            </label>
            <input type="number" id="pdam_price" value="14600" 
                class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-bold text-lg outline-none focus:border-emerald-500 transition italic">
        </div>

        <div class="bg-emerald-600 rounded-[2rem] p-8 text-white text-center shadow-xl relative overflow-hidden">
            <div class="relative z-10">
                <p class="uppercase tracking-widest text-[10px] font-bold opacity-90 mb-2 italic">
                    Estimasi Penghematan Bulanan
                </p>
                <div id="monthly_saving" class="responsive-text-saving font-black mb-4 leading-none italic">
                    Rp 0
                </div>
                <div class="inline-block bg-white/20 backdrop-blur-md px-6 py-2 rounded-full border border-white/30">
                    <span id="annual_saving" class="text-sm md:text-lg font-bold italic">
                        Rp 0 / Tahun
                    </span>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-slate-500 text-[11px] mb-6 italic italic leading-relaxed">
                "Invila™ dirancang agar limbah berhenti menjadi beban dan mulai menjadi aset produksi berkelanjutan."
            </p>
            <button onclick="kirimWhatsApp()" 
                class="w-full bg-slate-900 hover:bg-black text-white px-8 py-4 rounded-2xl text-lg font-extrabold transition shadow-lg transform active:scale-95 italic">
                Kirim Hasil ke WhatsApp
            </button>
        </div>
    </div>

    <script>
        function updateSavings() {
            // Mengambil nilai input
            const volTotal = parseFloat(document.getElementById('vol_total').value) || 0;
            const pdamPrice = parseFloat(document.getElementById('pdam_price').value) || 0;
            const invilaPrice = parseFloat(document.getElementById('invila_price').value) || 0;

            // Logika Perhitungan:
            // Selisih harga per m3 dikalikan total volume per hari
            const dailySaving = (pdamPrice - invilaPrice) * volTotal;
            const monthlySaving = dailySaving * 30;
            const annualSaving = monthlySaving * 12;

            // Formatter mata uang
            const formatter = new Intl.NumberFormat('id-ID', {
                style: 'currency', 
                currency: 'IDR', 
                maximumFractionDigits: 0
            });

            // Update tampilan
            document.getElementById('monthly_saving').innerText = formatter.format(monthlySaving).replace("Rp", "Rp ");
            document.getElementById('annual_saving').innerText = formatter.format(annualSaving).replace("Rp", "Rp ") + " / Tahun";
        }

        function kirimWhatsApp() {
            const saving = document.getElementById('monthly_saving').innerText;
            const vol = document.getElementById('vol_total').value;
            const msg = `Halo Tim Invila, mohon informasi lanjut tentang WWTP-WTP. (Simulasi kapasitas: ${vol} m3/hari, estimasi saving bulanan: ${saving})`;
            window.open(`https://wa.me/6285890135859?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Jalankan fungsi setiap kali ada input yang berubah
        document.querySelectorAll('input').forEach(el => {
            el.addEventListener('input', updateSavings);
        });

        // Jalankan saat pertama kali load
        window.onload = updateSavings;
    </script>
</body>
</html>
