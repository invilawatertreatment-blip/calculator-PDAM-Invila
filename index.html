<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .finance-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .gold-text { color: #fbbf24; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
        <div class="finance-gradient p-8 text-white text-center">
            <h2 class="text-2xl md:text-3xl font-extrabold italic tracking-tight mb-2">Financial Impact Analysis</h2>
            <p class="text-slate-400 text-sm uppercase tracking-[0.2em] font-semibold">Efisiensi Operasional & Strategi Capex</p>
        </div>

        <div class="p-6 md:p-10">
            <div class="grid md:grid-cols-3 gap-6 mb-8">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest italic">Volume Air (m³/hari)</label>
                    <input type="number" id="vol_total" value="2000" oninput="updateAll()" 
                        class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl font-bold text-lg outline-none focus:border-blue-500 transition shadow-inner">
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest italic">Tarif PDAM (Rp/m³)</label>
                    <input type="number" id="pdam_price" value="14600" oninput="updateAll()" 
                        class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl font-bold text-lg outline-none focus:border-blue-500 transition">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest italic">OPEX Invila™ (Rp/m³)</label>
                    <input type="number" id="invila_price" value="6900" oninput="updateAll()" 
                        class="w-full bg-slate-50 border-2 border-emerald-100 p-4 rounded-xl font-bold text-lg outline-none focus:border-emerald-500 text-emerald-700 transition">
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-emerald-600 rounded-3xl p-8 text-white shadow-lg transform hover:scale-[1.02] transition">
                    <p class="uppercase tracking-widest text-[10px] font-bold opacity-80 mb-2">Potensi Saving Bulanan (OPEX)</p>
                    <div id="monthly_saving" class="text-3xl md:text-4xl font-black mb-4 italic">Rp 0</div>
                    <div class="bg-white/20 p-3 rounded-lg inline-block border border-white/30 text-xs font-bold">
                        Efisiensi per Tahun: <span id="annual_saving">Rp 0</span>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-3xl p-8 text-white shadow-lg border-t-4 border-amber-500 transform hover:scale-[1.02] transition">
                    <p class="uppercase tracking-widest text-[10px] font-bold gold-text mb-2">Estimasi Nilai Investasi (CAPEX)</p>
                    <div id="capex_value" class="text-3xl md:text-4xl font-black mb-4 italic gold-text">Rp 0</div>
                    <div class="bg-amber-500/10 p-3 rounded-lg inline-block border border-amber-500/30 text-[10px] text-amber-200 font-bold uppercase tracking-wider">
                        Berdasarkan Kapasitas: <span id="lps_value">0</span> LPS
                    </div>
                </div>
            </div>

            <div class="mt-10 pt-8 border-t border-slate-100 flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="text-center md:text-left">
                    <p class="text-slate-400 text-[10px] italic">Perhitungan Capex diasumsikan Rp 250 Juta / LPS kapasitas terpasang.</p>
                </div>
                <button onclick="kirimWhatsApp()" 
                    class="w-full md:w-auto bg-slate-900 hover:bg-black text-white px-12 py-4 rounded-2xl text-lg font-extrabold transition shadow-xl transform active:scale-95 italic">
                    Dapatkan Analisis Detail
                </button>
            </div>
        </div>
    </div>

    <script>
        function updateAll() {
            const volTotal = parseFloat(document.getElementById('vol_total').value) || 0;
            const pdamPrice = parseFloat(document.getElementById('pdam_price').value) || 0;
            const invilaPrice = parseFloat(document.getElementById('invila_price').value) || 0;

            // 1. Hitung Saving OPEX
            const dailySaving = (pdamPrice - invilaPrice) * volTotal;
            const monthlySaving = dailySaving * 30;
            const annualSaving = monthlySaving * 12;

            // 2. Hitung Saving CAPEX
            const lps = volTotal / 86.4; // Konversi m3/hari ke LPS
            const totalCapex = lps * 250000000; // Rp 250jt per LPS

            // Formatter
            const formatter = new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', maximumFractionDigits: 0
            });

            // Update DOM
            document.getElementById('monthly_saving').innerText = formatter.format(monthlySaving).replace("Rp", "Rp ");
            document.getElementById('annual_saving').innerText = formatter.format(annualSaving).replace("Rp", "Rp ");
            document.getElementById('capex_value').innerText = formatter.format(totalCapex).replace("Rp", "Rp ");
            document.getElementById('lps_value').innerText = lps.toFixed(2);
        }

        function kirimWhatsApp() {
            const saving = document.getElementById('monthly_saving').innerText;
            const capex = document.getElementById('capex_value').innerText;
            const vol = document.getElementById('vol_total').value;
            const msg = `Halo Tim Invila, saya tertarik dengan analisis finansial sistem air.\n\nSimulasi:\n- Kapasitas: ${vol} m3/hari\n- Saving Operasional: ${saving}/bln\n- Estimasi Capex: ${capex}\n\nMohon jadwalkan diskusi lebih lanjut.`;
            window.open(`https://wa.me/6285890135859?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = updateAll;
    </script>
</body>
</html>
