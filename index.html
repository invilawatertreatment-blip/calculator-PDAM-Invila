<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invila™ | Strategic Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --gold: #C5A059; --navy: #020617; --slate: #1E293B;
            --emerald: #10B981; --white: #FFFFFF;
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            font-family: 'Inter', sans-serif; background: #020617; 
            color: #F8FAF9; margin: 0; padding: 20px; display: flex; align-items: center; min-height: 100vh;
        }
        .terminal-luxury { 
            max-width: 600px; margin: 0 auto; background: linear-gradient(145deg, #0f172a, #020617);
            border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 24px; padding: 45px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); position: relative;
        }
        .terminal-luxury::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--gold);
        }
        header { text-align: center; margin-bottom: 35px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); margin: 0; }
        .tagline { font-size: 10px; color: #94A3B8; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; }
        
        .input-group { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 18px; border-radius: 12px; margin-bottom: 15px; }
        label { display: block; font-size: 9px; font-weight: 700; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
        input { 
            width: 100%; background: transparent; border: none; color: var(--white); 
            font-family: 'JetBrains Mono', monospace; font-size: 22px; outline: none;
        }

        .recovery-banner { 
            background: rgba(197, 160, 89, 0.1); border: 1px solid var(--gold); padding: 30px; 
            border-radius: 16px; text-align: center; margin: 30px 0;
        }
        .recovery-banner h2 { font-size: 28px; font-family: 'JetBrains Mono', monospace; color: var(--gold); margin: 10px 0; }
        
        .btn-luxury { 
            width: 100%; padding: 22px; background: var(--gold); color: var(--navy); 
            border: none; border-radius: 12px; font-size: 13px; font-weight: 800; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-luxury:hover { background: #E5C284; transform: translateY(-2px); }

        footer { text-align: center; font-size: 9px; color: #64748B; margin-top: 30px; line-height: 1.8; }
    </style>
</head>
<body>

<div class="terminal-luxury">
    <header>
        <h1>INVILA™ STRATEGIC AUDIT</h1>
        <div class="tagline">Value Optimization Terminal</div>
    </header>

    <div class="input-group">
        <label>Operational Capacity (m³/day)</label>
        <input type="number" id="v" value="1000" oninput="run()">
    </div>
    <div class="input-group">
        <label>Baseline Tariff (IDR)</label>
        <input type="number" id="e" value="14800" oninput="run()">
    </div>
    <div class="input-group">
        <label>Invila Tariff (IDR)</label>
        <input type="number" id="i" value="6000" oninput="run()">
    </div>

    <div class="recovery-banner">
        <span style="font-size: 10px; font-weight: 700; color: #94A3B8;">5-YEAR LIQUIDITY RECOVERY</span>
        <h2 id="res_5">IDR 0</h2>
    </div>

    <button class="btn-luxury" onclick="generateReport()">Generate Strategic Report</button>

    <footer>
        PREPARED BY: INVILA™ STRATEGIC ADVISORY<br>
        Lead Strategic Engineer: Piator Simbolon
    </footer>
</div>

<script>
    const CAPEX_CONST = 2893519;
    function fmt(n) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n).replace("Rp", "Rp "); }

    function run() {
        const v = parseFloat(document.getElementById('v').value) || 0;
        const e = parseFloat(document.getElementById('e').value) || 0;
        const i = parseFloat(document.getElementById('i').value) || 0;
        const savings = v * 30 * 60 * (e - i);
        document.getElementById('res_5').innerText = fmt(savings);
    }
    window.onload = run;

    function generateReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const v = document.getElementById('v').value;
        const e = document.getElementById('e').value;
        const i = document.getElementById('i').value;
        const gap = e - i;
        const yearly = v * 365 * gap;
        const total = v * 30 * 60 * gap;
        const capexAvoid = v * CAPEX_CONST;

        // Cover Page
        doc.setFillColor(2, 6, 23); doc.rect(0, 0, 210, 297, 'F');
        doc.setTextColor(197, 160, 89); doc.setFont("times", "bold"); doc.setFontSize(26);
        doc.text("VALUE OPTIMIZATION REPORT 2026", 20, 60);
        doc.setFontSize(14); doc.setTextColor(255);
        doc.text("Strategic Infrastructure & Liquidity Recovery Memorandum", 20, 72);

        // Content Page
        doc.addPage();
        doc.setTextColor(2, 6, 23); doc.setFontSize(14); doc.setFont("helvetica", "bold");
        doc.text("1. EXECUTIVE SUMMARY: THE STRATEGIC PIVOT", 20, 30);
        doc.setFontSize(10); doc.setFont("helvetica", "normal");
        const summary = "Analisis ini memvalidasi pengalihan risiko infrastruktur ke model Asset-Light (Water-as-a-Service / WaaS). Strategi ini secara instan mengoptimalkan arus kas operasional tanpa pengeluaran modal (CapEx).";
        doc.text(doc.splitTextToSize(summary, 170), 20, 40);

        doc.setFont("helvetica", "bold"); doc.text("2. STRATEGIC ASSESSMENT METRICS", 20, 65);
        doc.setFillColor(245, 247, 250); doc.rect(20, 72, 170, 45, 'F');
        doc.text("Baseline Tariff: " + fmt(e) + "/m3", 25, 85);
        doc.text("Invila Tariff: " + fmt(i) + "/m3", 25, 95);
        doc.text("CapEx Exposure Avoidance: " + fmt(capexAvoid), 25, 105);

        doc.setFont("helvetica", "bold"); doc.text("3. PROJECTED 5-YEAR CASH RECOVERY", 20, 130);
        for(let yr=1; yr<=5; yr++) {
            doc.text("Year " + yr + ": " + fmt(yr * yearly * (360/365)), 25, 130 + (yr*8));
        }

        doc.setFont("helvetica", "bold"); doc.text("4. AUDITOR'S STRATEGIC OPINION", 20, 190);
        const opinion = "Transisi ke model Invila™ WaaS memindahkan seluruh risiko teknis dan biaya pemeliharaan ke pihak ketiga. Hal ini memungkinkan manajemen fokus sepenuhnya pada kompetensi inti manufaktur.";
        doc.setFont("helvetica", "normal"); doc.text(doc.splitTextToSize(opinion, 170), 20, 200);

        // SIGNATURE
        doc.setFont("helvetica", "bold"); doc.setFontSize(11);
        doc.text("Prepared by:", 20, 250);
        doc.setTextColor(197, 160, 89); doc.text("Piator Simbolon", 20, 257);
        doc.setTextColor(0); doc.setFont("helvetica", "normal"); doc.setFontSize(10);
        doc.text("Water & Strategic Engineer | Invila™ Strategic Advisory", 20, 263);

        window.open(doc.output('bloburl'), '_blank');
    }
</script>
</body>
</html>
