<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .finance-card { background: linear-gradient(145deg, #0f172a, #1e293b); }
        .gold-accent { color: #fbbf24; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .responsive-text { font-size: clamp(1.2rem, 4vw, 2.5rem); }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white rounded-[3rem] shadow-2xl p-6 md:p-10 border border-slate-100">
        <h2 class="text-2xl md:text-3xl font-extrabold mb-10 text-center italic tracking-tight text-slate-800 uppercase">
            Analisis Finansial Invila™
        </h2>

        <div class="grid md:grid-cols-3 gap-4 mb-10">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest italic">Volume (m³/hari)</label>
                <input type="number" id="vol_total" value="2000" oninput="calculate()" 
                    class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl font-bold text-lg outline-none focus:border-blue-500 transition shadow-inner">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest italic">Harga PDAM (Rp/m³)</label>
                <input type="number" id="pdam_price" value="14600" oninput="calculate()" 
                    class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl font-bold text-lg outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest italic">Jasa Invila™ (Rp/m³)</label>
                <input type="number" id="invila_price" value="6900" oninput="calculate()" 
                    class="w-full bg-slate-50 border-2 border-emerald-100 p-4 rounded-xl font-bold text-lg outline-none focus:border-emerald-500 text-emerald-700">
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            
            <div class="bg-emerald-600 rounded-[2rem] p-8 text-white shadow-xl relative overflow-hidden">
                <p class="uppercase tracking-widest text-[10px] font-bold opacity-80 mb-2 italic">Estimasi Saving Bulanan</p>
                <div id="monthly_saving" class="responsive-text font-black mb-4 italic leading-none">Rp 0</div>
                <div class="inline-block bg-white/20 backdrop-blur-md px-4 py-2 rounded-full border border-white/30 text-[10px] md:text-xs font-bold">
                    Efisiensi Tahunan: <span id="annual_saving">Rp 0</span>
                </div>
            </div>

            <div class="finance-card rounded-[2rem] p-8 text-white shadow-xl border-t-4 border-amber-500">
                <p class="uppercase tracking-widest text-[10px] font-bold gold-accent mb-2 italic">Estimasi Nilai Investasi (CAPEX)</p>
                <div id="capex_value" class="responsive-text font-black mb-4 gold-accent italic leading-none">Rp 0</div>
                <div class="inline-block bg-amber-500/10 px-4 py-2 rounded-full border border-amber-500/30 text-[10px] md:text-xs font-bold text-amber-200">
                    Kapasitas Terukur: <span id="lps_value">0</span> LPS
                </div>
            </div>

        </div>

        <div class="mt-10 text-center">
            <p class="text-slate-400 text-[11px] mb-6 italic leading-relaxed">
                *Estimasi CAPEX dihitung berdasarkan Rp 250 Juta per 1 LPS (Liter Per Second).
            </p>
            <button onclick="kirimWA()" 
                class="w-full bg-slate-900 hover:bg-black text-white px-10 py-5 rounded-2xl text-lg font-extrabold transition shadow-xl transform active:scale-95 italic">
                Kirim Hasil ke WhatsApp
            </button>
        </div>
    </div>

    <script>
        function calculate() {
            const vol = parseFloat(document.getElementById('vol_total').value) || 0;
            const pdam = parseFloat(document.getElementById('pdam_price').value) || 0;
            const invila = parseFloat(document.getElementById('invila_price').value) || 0;

            // Logika Saving
            const savingPerDay = (pdam - invila) * vol;
            const savingMonthly = savingPerDay * 30;
            const savingAnnual = savingMonthly * 12;

            // Logika CAPEX (Rp 250jt / LPS)
            // 1 m3/hari = 1/86.4 LPS
            const lps = vol / 86.4;
            const capex = lps * 250000000;

            const fmt = new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', maximumFractionDigits: 0
            });

            document.getElementById('monthly_saving').innerText = fmt.format(savingMonthly).replace("Rp", "Rp ");
            document.getElementById('annual_saving').innerText = fmt.format(savingAnnual).replace("Rp", "Rp ");
            document.getElementById('capex_value').innerText = fmt.format(capex).replace("Rp", "Rp ");
            document.getElementById('lps_value').innerText = lps.toFixed(2);
        }

        function kirimWA() {
            const vol = document.getElementById('vol_total').value;
            const saving = document.getElementById('monthly_saving').innerText;
            const capex = document.getElementById('capex_value').innerText;
            const msg = `Halo Tim Invila, saya ingin konsultasi sistem WWTP.\n\nSimulasi:\n- Kapasitas: ${vol} m3/hari\n- Saving: ${saving}/bulan\n- Est. Capex: ${capex}`;
            window.open(`https://wa.me/6285890135859?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = calculate;
    </script>
</body>
</html>
